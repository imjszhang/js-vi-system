<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Poster System — Visual Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../templates/_shared/schemes.css">
    <link rel="stylesheet" href="../templates/_shared/base.css">
    <link rel="stylesheet" href="../templates/terminal/styles.css">
    <link rel="stylesheet" href="../templates/card/styles.css">
    <link rel="stylesheet" href="../templates/cybertaoist/styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: { yellow: '#FCD228', black: '#000000', white: '#FFFFFF' }
                    },
                    boxShadow: {
                        'brutal': '4px 4px 0px 0px #000000',
                        'brutal-lg': '8px 8px 0px 0px #000000',
                        'brutal-hover': '2px 2px 0px 0px #000000',
                        'brutal-white': '4px 4px 0px 0px #FFFFFF',
                    },
                    borderWidth: { '3': '3px' },
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #111;
            background-image: none;
            color: #fff;
        }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #FCD228; border: 2px solid #111; }

        /* ── Control Panel ── */
        .ctrl-group { margin-bottom: 20px; }
        .ctrl-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #FCD228;
            margin-bottom: 6px;
            display: block;
        }
        .ctrl-btn {
            background: transparent;
            color: #888;
            border: 2px solid #333;
            padding: 6px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
        }
        .ctrl-btn:hover { border-color: #FCD228; color: #FCD228; }
        .ctrl-btn.active {
            background: #FCD228;
            color: #000;
            border-color: #FCD228;
        }
        .ctrl-input {
            width: 100%;
            background: #1a1a1a;
            border: 2px solid #333;
            color: #fff;
            padding: 8px 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.1s;
        }
        .ctrl-input:focus { border-color: #FCD228; }
        .ctrl-textarea {
            width: 100%;
            background: #1a1a1a;
            border: 2px solid #333;
            color: #fff;
            padding: 8px 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            outline: none;
            resize: vertical;
            min-height: 60px;
            transition: border-color 0.1s;
        }
        .ctrl-textarea:focus { border-color: #FCD228; }

        /* ── Poster Canvas ── */
        .poster-stage {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            min-height: 0;
            padding: 32px;
            overflow: hidden;
        }
        .poster-frame {
            transform-origin: center center;
            transition: width 0.3s, height 0.3s;
            flex-shrink: 0;
        }

        /* ── Sidebar scrollbar ── */
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: #111; }
        .sidebar::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden font-sans">

    <!-- Navigation -->
    <nav class="flex-shrink-0 bg-black border-b-3 border-[#FCD228] px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="index.html" class="font-mono text-xs font-bold text-[#888] hover:text-[#FCD228] transition-colors">&larr; BRAND MANUAL</a>
            <span class="text-[#333]">|</span>
            <span class="font-bold text-lg tracking-tight uppercase">JS POSTER SYSTEM</span>
        </div>
        <div class="flex items-center gap-3">
            <span class="font-mono text-[10px] text-[#555]">v1.1</span>
            <div class="w-8 h-8 rounded-full shadow-[2px_2px_0px_0px_rgba(252,210,40,0.3)]" id="nav-logo"></div>
        </div>
    </nav>

    <!-- Main Layout -->
    <div class="flex flex-1 min-h-0">

        <!-- Sidebar -->
        <aside class="sidebar w-[300px] flex-shrink-0 bg-[#0a0a0a] border-r-3 border-[#222] overflow-y-auto p-5">

            <!-- Poster Type -->
            <div class="ctrl-group">
                <span class="ctrl-label">// poster type</span>
                <div class="flex flex-wrap gap-1" id="type-buttons"></div>
            </div>

            <!-- Color Scheme -->
            <div class="ctrl-group">
                <span class="ctrl-label">// color scheme</span>
                <div class="flex gap-1">
                    <button class="ctrl-btn" data-scheme="daylight" onclick="setScheme('daylight')">
                        <span style="color:#FCD228">&#9632;</span> DAYLIGHT
                    </button>
                    <button class="ctrl-btn active" data-scheme="dark" onclick="setScheme('dark')">
                        <span style="color:#000">&#9632;</span> DARK
                    </button>
                    <button class="ctrl-btn" data-scheme="minimal" onclick="setScheme('minimal')">
                        <span style="color:#fff">&#9632;</span> MINIMAL
                    </button>
                </div>
            </div>

            <!-- Size -->
            <div class="ctrl-group">
                <span class="ctrl-label">// size</span>
                <div class="flex flex-wrap gap-1" id="size-buttons"></div>
            </div>

            <hr class="border-[#222] my-5">

            <!-- Editable Content -->
            <div class="ctrl-group">
                <span class="ctrl-label">// content</span>
            </div>

            <div class="ctrl-group" id="field-tag" style="display:none">
                <label class="ctrl-label" style="color:#888">TAG</label>
                <input class="ctrl-input" id="input-tag" value="EVENT" oninput="updateContent()">
            </div>

            <div class="ctrl-group" id="field-title">
                <label class="ctrl-label" style="color:#888">TITLE</label>
                <textarea class="ctrl-textarea" id="input-title" oninput="updateContent()">SYSTEM
INITIALIZED</textarea>
            </div>

            <div class="ctrl-group" id="field-subtitle">
                <label class="ctrl-label" style="color:#888">SUBTITLE</label>
                <input class="ctrl-input" id="input-subtitle" value="// Mastering AI with Eastern Philosophy" oninput="updateContent()">
            </div>

            <div class="ctrl-group" id="field-date">
                <label class="ctrl-label" style="color:#888">DATE</label>
                <input class="ctrl-input" id="input-date" value="2026.03.19" oninput="updateContent()">
            </div>

            <div class="ctrl-group" id="field-location">
                <label class="ctrl-label" style="color:#888">LOCATION</label>
                <input class="ctrl-input" id="input-location" value="CYBERSPACE" oninput="updateContent()">
            </div>

            <div class="ctrl-group" id="field-info" style="display:none">
                <label class="ctrl-label" style="color:#888">INFO</label>
                <input class="ctrl-input" id="input-info" value="js@cyber-taoist.com" oninput="updateContent()">
            </div>

            <hr class="border-[#222] my-5">
            <div class="font-mono text-[10px] text-[#333] leading-relaxed">
                <p>ALL POSTERS FOLLOW JS VI SYSTEM RULES:</p>
                <p class="mt-1">NO GRADIENTS / NO ROUNDED CORNERS / NO SOFT SHADOWS / NO PASTEL COLORS</p>
            </div>
        </aside>

        <!-- Poster Preview Stage -->
        <div class="poster-stage" id="poster-stage">
            <div class="poster-frame" id="poster-frame">
                <div class="poster" id="poster"></div>
            </div>
        </div>
    </div>

    <script type="module">
    import { render as renderTerminal } from '../templates/terminal/render.js';
    import { render as renderCard } from '../templates/card/render.js';
    import { render as renderCyberTaoist } from '../templates/cybertaoist/render.js';
    import { SIZES } from '../templates/_shared/sizes.js';
    import { LOGO_SVG } from '../templates/_shared/logo.js';

    const TEMPLATES = {
      terminal: renderTerminal,
      card: renderCard,
      cybertaoist: renderCyberTaoist,
    };

    const TEMPLATE_LABELS = {
      terminal: 'TERMINAL',
      card: 'CARD',
      cybertaoist: 'CYBER',
    };

    const SIZE_LABELS = {
      a4: 'A4',
      square: 'SQUARE',
      banner: '16:9',
      story: '9:16',
    };

    /* Load meta for each template */
    const METAS = {};
    for (const name of Object.keys(TEMPLATES)) {
      const resp = await fetch(`../templates/${name}/meta.json`);
      METAS[name] = await resp.json();
    }

    /* State */
    const state = {
      type: 'terminal',
      scheme: 'dark',
      size: 'a4',
      content: {
        tag: 'EVENT',
        title: 'SYSTEM\nINITIALIZED',
        subtitle: '// Mastering AI with Eastern Philosophy',
        date: '2026.03.19',
        location: 'CYBERSPACE',
        info: 'js@cyber-taoist.com',
      }
    };

    /* ── Build dynamic buttons ── */

    function buildTypeButtons() {
      const container = document.getElementById('type-buttons');
      const names = Object.keys(TEMPLATES);
      container.innerHTML = names.map(name =>
        `<button class="ctrl-btn${name === state.type ? ' active' : ''}" data-type="${name}">${TEMPLATE_LABELS[name] || name.toUpperCase()}</button>`
      ).join('');
      container.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => setType(btn.dataset.type));
      });
    }

    function buildSizeButtons() {
      const container = document.getElementById('size-buttons');
      const keys = Object.keys(SIZES);
      container.innerHTML = keys.map(key =>
        `<button class="ctrl-btn${key === state.size ? ' active' : ''}" data-size="${key}">${SIZE_LABELS[key] || key.toUpperCase()}</button>`
      ).join('');
      container.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => setSize(btn.dataset.size));
      });
    }

    /* ── Field Visibility ── */

    function updateFieldVisibility() {
      const meta = METAS[state.type];
      const fieldKeys = meta ? meta.fields.map(f => f.key) : [];
      const allFields = ['tag', 'title', 'subtitle', 'date', 'location', 'info'];
      allFields.forEach(f => {
        const el = document.getElementById('field-' + f);
        if (el) el.style.display = fieldKeys.includes(f) ? 'block' : 'none';
      });
    }

    /* ── State Setters ── */

    window.setType = function(type) {
      state.type = type;
      document.querySelectorAll('[data-type]').forEach(b => b.classList.toggle('active', b.dataset.type === type));
      updateFieldVisibility();
      render();
    };

    window.setScheme = function(scheme) {
      state.scheme = scheme;
      document.querySelectorAll('[data-scheme]').forEach(b => b.classList.toggle('active', b.dataset.scheme === scheme));
      render();
    };

    window.setSize = function(size) {
      state.size = size;
      document.querySelectorAll('[data-size]').forEach(b => b.classList.toggle('active', b.dataset.size === size));
      render();
    };

    window.updateContent = function() {
      state.content.tag = document.getElementById('input-tag').value;
      state.content.title = document.getElementById('input-title').value;
      state.content.subtitle = document.getElementById('input-subtitle').value;
      state.content.date = document.getElementById('input-date').value;
      state.content.location = document.getElementById('input-location').value;
      state.content.info = document.getElementById('input-info').value;
      render();
    };

    /* ── Render & Scale ── */

    function render() {
      const frame = document.getElementById('poster-frame');
      const poster = document.getElementById('poster');
      const dim = SIZES[state.size];

      frame.style.width = dim.w + 'px';
      frame.style.height = dim.h + 'px';
      frame.className = `poster-frame scheme-${state.scheme}`;

      const renderFn = TEMPLATES[state.type];
      poster.innerHTML = renderFn ? renderFn(state.content) : '<div>Template not found</div>';
      scalePoster();
    }

    function scalePoster() {
      const stage = document.getElementById('poster-stage');
      const frame = document.getElementById('poster-frame');
      const dim = SIZES[state.size];

      const stageW = stage.clientWidth - 64;
      const stageH = stage.clientHeight - 64;

      const scaleX = stageW / dim.w;
      const scaleY = stageH / dim.h;
      const scale = Math.min(scaleX, scaleY, 1);

      frame.style.transform = `scale(${scale})`;
    }

    /* ── Init ── */
    document.getElementById('nav-logo').innerHTML = LOGO_SVG;
    buildTypeButtons();
    buildSizeButtons();
    updateFieldVisibility();
    render();
    window.addEventListener('resize', scalePoster);
    </script>
</body>
</html>
